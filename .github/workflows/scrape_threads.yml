name: Daily Threads Scraper

on:
  schedule:
    # 💡 解決策：日本時間の深夜 04:30 (UTC 前日19:30) にセット
    - cron: '30 19 * * *'
  workflow_dispatch: # 手動実行ボタンも残しておく

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth playwright
          playwright install chromium

      - name: Run Threads scraper
        env:
          GCP_JSON_KEY: ${{ secrets.GCP_JSON_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # Instagramのセッション鍵をそのままThreadsの環境変数に流し込みます
          THREADS_SESSION_ID: ${{ secrets.THREADS_SESSION_ID }}
        run: python threads.py
